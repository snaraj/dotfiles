add_newline = false
format = "$all"

[character]
success_symbol = " [🗡️](bold green)"
error_symbol = " [☠️](bold red)"

[lua]
symbol = "🌙" 
format = "[$symbol $version]($style) "
style = "bold blue"

[rust]
format = "via [$symbol $version]($style) "
symbol = "🦀"
style = "bold red"

[git_branch]
symbol = ""
format = "[$symbol $branch]($style) "
style = "bright-purple"

[git_metrics]
disabled = true

[git_status]
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"

[package]
format = "[$symbol $version]($style) " 
symbol = "📦"
style = "bold 208"
disabled = true
